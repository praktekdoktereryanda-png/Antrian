<!DOCTYPE html>
<html>
<head>
  <title>Remote Antrian</title>
</head>
<body>

  <h2>Antrian Umum: <span id="umum">0</span></h2>
  <h2>Antrian Sunat: <span id="sunat">0</span></h2>

  <h2>Panggilan:</h2>
  <p>Nomor: <span id="nomor">0</span></p>
  <p>Tipe: <span id="tipe">-</span></p>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔥 CONFIG (PASTIKAN SAMA)
    const firebaseConfig = {
     apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
  authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
  databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-klinik-cf6cb",
  storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
  messagingSenderId: "737102197117",
  appId: "1:737102197117:web:cc4752ea0c879741e35c14",
  measurementId: "G-K11JPNJPBR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 🔥 Ambil data root
    const rootRef = ref(db, "/");

    onValue(rootRef, (snapshot) => {
      const data = snapshot.val();

      console.log("DATA:", data);

      // Update UI
      document.getElementById("umum").innerText = data?.Umum ?? 0;
      document.getElementById("sunat").innerText = data?.Sunat ?? 0;

      document.getElementById("nomor").innerText = data?.panggilan_klinik?.nomor ?? 0;
      document.getElementById("tipe").innerText = data?.panggilan_klinik?.tipe ?? "-";
    });

  </script>

</body>
</html>
