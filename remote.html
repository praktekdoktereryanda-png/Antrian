<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote HP</title>
    <style>
        body { font-family: sans-serif; background: #f1f2f6; padding: 20px; text-align: center; }
        .btn { width: 100%; padding: 25px; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 15px; margin-bottom: 20px; cursor: pointer; }
        .btn-umum { background: #3498db; }
        .btn-sunat { background: #e67e22; }
        .btn-reset { background: #dcdde1; color: #2f3542; margin-top: 30px; padding: 10px; font-size: 14px; }
        .status { background: #2f3542; color: #7bed9f; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h2>REMOTE ANTRIAN</h2>
    <div id="status" class="status">Menyambungkan...</div>
    <br>
    <button class="btn btn-umum" onclick="panggil('Umum')">PANGGIL UMUM (P/S)</button>
    <button class="btn btn-sunat" onclick="panggil('Sunat')">PANGGIL SUNAT (N)</button>
    <button class="btn btn-reset" onclick="resetData()">Reset Antrian Ke 0</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUGh816sqOpUlCBvTpHaPlrSV_Gi4kHiU",
            authDomain: "antrianklinik-784b0.firebaseapp.com",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref(".info/connected").on("value", (snap) => {
            document.getElementById('status').innerText = snap.val() ? "Status: TERHUBUNG ✅" : "Status: TERPUTUS ❌";
        });

        let nUmum = 0;
        let nSunat = 0;

        // Sinkronisasi nomor terakhir agar tidak balik ke 0 saat refresh HP
        db.ref('panggilan_terbaru').on('value', (s) => {
            const d = s.val();
            if(d) {
                if(d.tipe === 'Umum') nUmum = d.nomor;
                else if(d.tipe === 'Sunat') nSunat = d.nomor;
            } else {
                nUmum = 0; nSunat = 0;
            }
        });

        function panggil(tipe) {
            let nomor = (tipe === 'Umum') ? ++nUmum : ++nSunat;
            db.ref('panggilan_terbaru').set({ tipe: tipe, nomor: nomor, waktu: Date.now() });
        }

        function resetData() {
            if(confirm("Yakin ingin reset nomor ke 0?")) {
                db.ref('panggilan_terbaru').remove();
            }
        }
    </script>
</body>
</html>
