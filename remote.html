<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <button style="width:100%; height:100px;" onclick="panggil()">PANGGIL BERIKUTNYA</button>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_ANDA_DI_SINI",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let n = 0;

        function panggil() {
            n++;
            db.ref('panggilan').set({ nomor: "P-" + n, waktu: Date.now() });
        }
    </script>
</body>
</html>
