<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Control Antrian</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        .card { background: #2c3e50; padding: 25px; border-radius: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { margin: 0 0 15px 0; color: #3498db; }
        .display-num { font-size: 40px; font-weight: bold; margin-bottom: 20px; color: #ecf0f1; }
        button { width: 100%; padding: 20px; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; color: white; transition: 0.2s; }
        .btn-umum { background: #27ae60; margin-bottom: 10px; }
        .btn-sunat { background: #e67e22; margin-bottom: 10px; }
        .btn-reset { background: #c0392b; font-size: 14px; padding: 10px; margin-top: 10px; }
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card">
        <h2>UMUM (P/S)</h2>
        <div id="num-umum" class="display-num">0</div>
        <button class="btn-umum" onclick="kirimPanggilan('Umum')">PANGGIL BERIKUTNYA</button>
    </div>

    <div class="card">
        <h2>SUNAT (N)</h2>
        <div id="num-sunat" class="display-num">0</div>
        <button class="btn-sunat" onclick="kirimPanggilan('Sunat')">PANGGIL BERIKUTNYA</button>
    </div>

    <button class="btn-reset" onclick="resetAntrian()">RESET SEMUA NOMOR</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7...", // Samakan dengan index.html
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil data terakhir dari Firebase agar nomor sinkron saat HP direfresh
        db.ref('panggilan_klinik').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Kita hanya update display di HP saja, tidak memicu suara lagi
            }
        });

        let currentUmum = 0;
        let currentSunat = 0;

        function kirimPanggilan(tipe) {
            let nomor = 0;
            if (tipe === 'Umum') {
                currentUmum++;
                nomor = currentUmum;
                document.getElementById('num-umum').innerText = nomor;
            } else {
                currentSunat++;
                nomor = currentSunat;
                document.getElementById('num-sunat').innerText = nomor;
            }

            // Kirim ke Firebase
            db.ref('panggilan_klinik').set({
                tipe: tipe,
                nomor: nomor,
                trigger: Date.now()
            });
        }

        function resetAntrian() {
            if(confirm("Yakin ingin reset nomor ke 0?")) {
                currentUmum = 0;
                currentSunat = 0;
                document.getElementById('num-umum').innerText = 0;
                document.getElementById('num-sunat').innerText = 0;
                db.ref('panggilan_klinik').set({
                    tipe: 'Reset',
                    nomor: 0,
                    trigger: Date.now()
                });
            }
        }
    </script>
</body>
</html>
