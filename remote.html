<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Antrian</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #34495e; padding: 20px; border-radius: 15px; color: white; text-align: center; }
        button { width: 100%; height: 80px; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-call { background: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-call:active { background: #27ae60; transform: scale(0.95); }
        .status { font-size: 14px; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>ANTRIAN UMUM</h3>
        <button class="btn-call" onclick="panggil('Umum')">PANGGIL UMUM</button>
        <div id="stat-umum" class="status">Memuat data...</div>
    </div>

    <div class="card">
        <h3>ANTRIAN SUNAT</h3>
        <button class="btn-call" onclick="panggil('Sunat')">PANGGIL SUNAT</button>
        <div id="stat-sunat" class="status">Memuat data...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_ANDA",
            authDomain: "PROJECT_ANDA.firebaseapp.com",
            databaseURL: "https://PROJECT_ANDA-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "PROJECT_ANDA",
            storageBucket: "PROJECT_ANDA.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variabel lokal untuk menyimpan nomor terbaru
        let nUmum = 0;
        let nSunat = 0;

        // 1. FUNGSI SYNC: Mengambil data terakhir dari Firebase agar nomor tidak reset saat refresh
        db.ref('nomor_terakhir').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                nUmum = data.Umum || 0;
                nSunat = data.Sunat || 0;
                document.getElementById('stat-umum').innerText = "Nomor terakhir: " + nUmum;
                document.getElementById('stat-sunat').innerText = "Nomor terakhir: " + nSunat;
            } else {
                document.getElementById('stat-umum').innerText = "Nomor terakhir: 0";
                document.getElementById('stat-sunat').innerText = "Nomor terakhir: 0";
            }
        });

        // 2. FUNGSI PANGGIL
        function panggil(tipe) {
            let nomorTerpilih = 0;

            if (tipe === 'Umum') {
                nUmum++;
                nomorTerpilih = nUmum;
            } else {
                nSunat++;
                nomorTerpilih = nSunat;
            }

            // Update database untuk mentrigger suara di laptop/display
            db.ref('panggilan_klinik').set({
                tipe: tipe,
                nomor: nomorTerpilih,
                trigger: Date.now()
            });

            // Simpan status nomor terakhir agar sinkron di semua HP remote
            db.ref('nomor_terakhir').update({
                [tipe]: nomorTerpilih
            });
        }
    </script>
</body>
</html>
