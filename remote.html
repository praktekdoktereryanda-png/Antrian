<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote</title>
</head>
<body style="text-align:center; background:#222; color:white; font-family:sans-serif;">
    <h2>REMOTE ANTRIAN</h2>
    <button onclick="kirim(1)" style="width:90%; height:100px; background:blue; color:white; font-size:20px; border-radius:10px;">PANGGIL UMUM</button>
    <br><br>
    <div id="status">Menunggu...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const conf = {
            apiKey: "AIzaSyAUGh816sqOpUlCBvTpHaPlrSV_Gi4kHiU",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0"
        };
        firebase.initializeApp(conf);
        const db = firebase.database();

        let n = 0;
        function kirim(x) {
            n++;
            // Nama 'antrian_sekarang' harus SAMA dengan di index.html
            db.ref('antrian_sekarang').set({
                nomor: n,
                waktu: Date.now()
            })
            .then(() => { document.getElementById('status').innerText = "Berhasil panggil #" + n; })
            .catch((e) => { alert("Error: " + e.message); });
        }
    </script>
</body>
</html>
