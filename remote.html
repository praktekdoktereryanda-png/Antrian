<script>
const firebaseConfig = {
    apiKey: "ISI_API_KEY_ANDA",
    authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
    databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "antrian-klinik-cf6cb",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 Ambil data realtime biar status selalu update
db.ref('/').on('value', (snap) => {
    const data = snap.val() || {};

    document.getElementById('stat-umum').innerText =
        "Nomor terakhir: " + (data.Umum || 0);

    document.getElementById('stat-sunat').innerText =
        "Nomor terakhir: " + (data.Sunat || 0);
});

// 🔥 Fungsi panggil FIX (anti bentrok)
function panggil(tipe) {
    db.ref('/').once('value').then((snap) => {
        const data = snap.val() || {};

        let umum = data.Umum || 0;
        let sunat = data.Sunat || 0;
        let nomorBaru = 0;

        if (tipe === 'Umum') {
            umum++;
            nomorBaru = umum;
        } else {
            sunat++;
            nomorBaru = sunat;
        }

        // 🔥 Update SEMUA ke Firebase (sinkron display)
        db.ref('/').set({
            Umum: umum,
            Sunat: sunat,
            panggilan_klinik: {
                tipe: tipe,
                nomor: nomorBaru,
                trigger: Date.now()
            }
        });
    });
}
</script>
