<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Antrian PRO</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #f4f7f6;
}
h1 { margin-top: 20px; }

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 40%;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.nomor {
    font-size: 60px;
    margin: 10px 0;
}

button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.next { background: #27ae60; color: white; }
.ulang { background: #f39c12; color: white; }
</style>
</head>
<body>

<h1>Panel Admin Antrian</h1>

<div class="container">

<div class="box">
    <h2>Sunat</h2>
    <div class="nomor" id="sunat">0</div>
    <button class="next" onclick="next('Sunat')">NEXT</button>
    <button class="ulang" onclick="ulang('Sunat')">ULANGI</button>
</div>

<div class="box">
    <h2>Umum</h2>
    <div class="nomor" id="umum">0</div>
    <button class="next" onclick="next('Umum')">NEXT</button>
    <button class="ulang" onclick="ulang('Umum')">ULANGI</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "APIKEY_KAMU",
    authDomain: "PROJECT.firebaseapp.com",
    databaseURL: "https://PROJECT.firebaseio.com",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Ambil data realtime
db.ref('antrian').on('value', snap => {
    const data = snap.val();
    if (!data) return;

    document.getElementById('sunat').innerText = data.Sunat || 0;
    document.getElementById('umum').innerText = data.Umum || 0;
});

// NEXT
function next(tipe) {
    db.ref('antrian/' + tipe).transaction(current => {
        return (current || 0) + 1;
    });

    db.ref('antrian/' + tipe).once('value', snap => {
        db.ref('panggilan_terbaru').set({
            tipe: tipe,
            nomor: snap.val()
        });
    });
}

// ULANGI
function ulang(tipe) {
    db.ref('antrian/' + tipe).once('value', snap => {
        db.ref('panggilan_terbaru').set({
            tipe: tipe,
            nomor: snap.val()
        });
    });
}
</script>

</body>
</html>
