<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote HP Antrian</title>
    <style>
        body { 
            font-family: sans-serif; background: #2c3e50; margin: 0; padding: 20px; 
            display: flex; flex-direction: column; height: 100vh; justify-content: center; box-sizing: border-box; 
        }
        
        .card { background: #34495e; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        h3 { color: #bdc3c7; margin: 0 0 15px 0; font-size: 18px; letter-spacing: 1px; }

        button { 
            width: 100%; height: 100px; font-size: 24px; font-weight: bold; border-radius: 15px; border: none; 
            cursor: pointer; transition: 0.1s; color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }

        .btn-umum { background: #3498db; }
        .btn-umum:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); background: #2980b9; }

        .btn-sunat { background: #e67e22; }
        .btn-sunat:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); background: #d35400; }

        .status { font-size: 16px; color: #f1c40f; margin-top: 15px; font-weight: bold; }
        #koneksi { position: fixed; top: 0; left: 0; width: 100%; text-align: center; padding: 5px; font-size: 11px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="koneksi">Menghubungkan ke Firebase...</div>

    <div class="card">
        <h3>ANTRIAN UMUM</h3>
        <button class="btn-umum" onclick="panggil('Umum')">PANGGIL UMUM</button>
        <div id="stat-umum" class="status">Nomor terakhir: 0</div>
    </div>

    <div class="card">
        <h3>ANTRIAN SUNAT</h3>
        <button class="btn-sunat" onclick="panggil('Sunat')">PANGGIL SUNAT</button>
        <div id="stat-sunat" class="status">Nomor terakhir: 0</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // CONFIG ASLI SESUAI DATABASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyAUGh816sqOpUlCBvTpHaPlrSV_Gi4kHiU",
            authDomain: "antrianklinik-784b0.firebaseapp.com",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let nUmum = 0;
        let nSunat = 0;

        // Ambil nomor terakhir dari database agar tidak reset ke 0 saat HP direfresh
        db.ref('panggilan_terbaru').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (data.tipe === 'Umum') {
                    nUmum = data.nomor;
                    document.getElementById('stat-umum').innerText = "Nomor terakhir: " + nUmum;
                } else if (data.tipe === 'Sunat') {
                    nSunat = data.nomor;
                    document.getElementById('stat-sunat').innerText = "Nomor terakhir: " + nSunat;
                }
                document.getElementById('koneksi').innerText = "Status: Online ✅";
            }
        });

        function panggil(tipe) {
            let nomor = (tipe === 'Umum') ? ++nUmum : ++nSunat;

            // KIRIM DATA (Gunakan 'panggilan_terbaru' agar singkron dengan index.html)
            db.ref('panggilan_terbaru').set({
                tipe: tipe,
                nomor: nomor,
                waktu: Date.now()
            });
        }
    </script>
</body>
</html>
