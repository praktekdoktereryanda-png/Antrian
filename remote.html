<!DOCTYPE html>
<html>
<head>
    <title>Admin Remote - Antrian</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #ecf0f1; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1000px; margin: auto; }
        .col { flex: 1; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .btn { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-call { background: #27ae60; margin-right: 5px; }
        .btn-done { background: #e74c3c; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Remote Admin Web</h2>
    <div class="container">
        <div class="col">
            <h3>Sunat (N)</h3>
            <div id="list-sunat"></div>
        </div>
        <div class="col">
            <h3>Umum (P/S)</h3>
            <div id="list-umum"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* SAMA DENGAN DI ATAS */
            apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
            authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
            databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrian-klinik-cf6cb",
            storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
            messagingSenderId: "737102197117",
            appId: "1:737102197117:web:cc4752ea0c879741e35c14"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sync(path, elementId, tipe) {
            db.ref('antrian/antrian_list/' + path).on('value', snap => {
                const el = document.getElementById(elementId);
                el.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val();
                    if (data.status === 'menunggu') {
                        el.innerHTML += `<div class="item">
                            <span><b>${data.kode}-${data.nomor}</b></span>
                            <div>
                                <button class="btn btn-call" onclick="panggil('${tipe}', ${data.nomor}, '${data.kode}')">PANGGIL</button>
                                <button class="btn btn-done" onclick="selesai('${path}', '${child.key}')">SELESAI</button>
                            </div>
                        </div>`;
                    }
                });
            });
        }

        function panggil(tipe, no, kode) {
            db.ref('antrian/is_calling').set(true);
            db.ref('panggilan_terbaru').set({
                nomor: no, tipe: tipe, kode: kode, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            const field = tipe === 'SUNAT' ? 'Sunat' : 'Umum';
            db.ref('antrian/nomor_dipanggil/' + field).set(no);
            if (tipe === 'UMUM') db.ref('antrian/nomor_dipanggil/kode_umum').set(kode);
        }

        function selesai(path, key) {
            db.ref('antrian/antrian_list/' + path + '/' + key + '/status').set('selesai');
        }

        sync('sunat', 'list-sunat', 'SUNAT');
        sync('umum', 'list-umum', 'UMUM');
    </script>
</body>
</html>
