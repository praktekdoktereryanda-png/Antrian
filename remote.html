<!DOCTYPE html>
<html>
<head>
    <title>Admin Antrian</title>
</head>
<body>

<h2>Panel Admin</h2>

<button onclick="panggil('Sunat')">Panggil Sunat</button>
<button onclick="panggil('Umum')">Panggil Umum</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "APIKEY_KAMU",
    authDomain: "PROJECT.firebaseapp.com",
    databaseURL: "https://PROJECT.firebaseio.com",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let nomorSunat = 0;
let nomorUmum = 0;

function panggil(tipe) {
    let nomor;

    if (tipe === "Sunat") {
        nomorSunat++;
        nomor = nomorSunat;
    } else {
        nomorUmum++;
        nomor = nomorUmum;
    }

    db.ref('panggilan_terbaru').set({
        tipe: tipe,
        nomor: nomor
    });
}
</script>

</body>
</html>
