<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Antrian - Dokter Yanda</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin: 0; }
        .card { background: #34495e; padding: 20px; border-radius: 15px; color: white; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h3 { margin-top: 0; color: #ecf0f1; letter-spacing: 1px; }
        button { width: 100%; height: 90px; font-size: 22px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 #27ae60; position: relative; }
        .btn-call { background: #2ecc71; color: white; }
        .btn-call:active { background: #27ae60; transform: translateY(4px); box-shadow: 0 1px 0 #27ae60; }
        .btn-sunat { background: #e67e22; box-shadow: 0 5px 0 #d35400; }
        .btn-sunat:active { background: #d35400; transform: translateY(4px); box-shadow: 0 1px 0 #d35400; }
        .status { font-size: 16px; color: #f1c40f; margin-top: 15px; font-weight: bold; }
        #koneksi { font-size: 12px; text-align: center; padding: 5px; border-radius: 5px; margin-bottom: 10px; }
        .online { background: #27ae60; color: white; }
        .offline { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div id="koneksi" class="offline">Menyambungkan ke Firebase...</div>

    <div class="card">
        <h3>ANTRIAN UMUM</h3>
        <button class="btn-call" onclick="panggil('Umum')">PANGGIL UMUM</button>
        <div id="stat-umum" class="status">Nomor terakhir: 0</div>
    </div>

    <div class="card">
        <h3>ANTRIAN SUNAT</h3>
        <button class="btn-sunat" onclick="panggil('Sunat')">PANGGIL SUNAT</button>
        <div id="stat-sunat" class="status">Nomor terakhir: 0</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // CONFIG ASLI SESUAI PROYEK ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyAUGh816sqOpUlCBvTpHaPlrSV_Gi4kHiU",
            authDomain: "antrianklinik-784b0.firebaseapp.com",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0",
            storageBucket: "antrianklinik-784b0.firebasestorage.app",
            messagingSenderId: "432563775264",
            appId: "1:432563775264:web:e584f7c35e93a666c91945"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let nUmum = 0;
        let nSunat = 0;

        // CEK KONEKSI REALTIME
        const conDiv = document.getElementById('koneksi');
        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                conDiv.innerText = "Sistem Online ✅";
                conDiv.className = "online";
            } else {
                conDiv.innerText = "Sistem Offline ❌ (Cek Internet)";
                conDiv.className = "offline";
            }
        });

        // AMBIL NOMOR TERAKHIR DARI DATABASE AGAR SINKRON
        db.ref('panggilan_terbaru').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Update variabel lokal sesuai data terakhir di cloud
                if (data.tipe === 'Umum') {
                    nUmum = data.nomor;
                    document.getElementById('stat-umum').innerText = "Nomor terakhir: " + nUmum;
                } else if (data.tipe === 'Sunat') {
                    nSunat = data.nomor;
                    document.getElementById('stat-sunat').innerText = "Nomor terakhir: " + nSunat;
                }
            }
        });

        function panggil(tipe) {
            let nomor = 0;
            if (tipe === 'Umum') {
                nUmum++;
                nomor = nUmum;
            } else {
                nSunat++;
                nomor = nSunat;
            }

            // KIRIM DATA KE FIREBASE (Node: panggilan_terbaru)
            db.ref('panggilan_terbaru').set({
                tipe: tipe,
                nomor: nomor,
                waktu: Date.now() 
            }).then(() => {
                console.log("Berhasil panggil: " + tipe + " " + nomor);
            }).catch((err) => {
                alert("Gagal kirim data: " + err.message);
            });
        }
    </script>
</body>
</html>
