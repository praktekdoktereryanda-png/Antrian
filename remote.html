<!DOCTYPE html>
<html>
<head>
    <title>Remote Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-panggil { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>PANGGIL ANTRIAN</h2>
    <div id="list-antrian">Memuat...</div>

    <script>
        const firebaseConfig = { databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Gabungkan list sunat dan umum untuk dipantau admin
        function loadList() {
            db.ref('antrian_list').on('value', (snapshot) => {
                const listDiv = document.getElementById('list-antrian');
                listDiv.innerHTML = "";
                
                snapshot.forEach((category) => {
                    category.forEach((item) => {
                        const data = item.val();
                        if (data.status === "menunggu") {
                            const div = document.createElement('div');
                            div.className = 'card';
                            div.innerHTML = `
                                <b>${data.kode}-${data.nomor.toString().padStart(2, '0')} (${category.key.toUpperCase()})</b>
                                <button class="btn-panggil" onclick="panggil('${category.key}', '${item.key}', ${data.nomor}, '${data.kode}')">PANGGIL</button>
                            `;
                            listDiv.appendChild(div);
                        }
                    });
                });
            });
        }

        function panggil(tipe, key, nomor, kode) {
            const label = (tipe === 'sunat') ? 'Sunat' : 'Umum';
            const updates = {};
            // 1. Update status agar hilang dari daftar tunggu
            updates[`antrian_list/${tipe}/${key}/status`] = "dipanggil";
            // 2. Kirim ke TV
            updates[`antrian/nomor_dipanggil/${label}`] = nomor;
            updates[`antrian/tipe_panggil`] = tipe.toUpperCase();
            updates[`antrian/kode_umum`] = kode;
            updates[`antrian/is_calling`] = true;

            db.ref().update(updates);
        }

        loadList();
    </script>
</body>
</html>
