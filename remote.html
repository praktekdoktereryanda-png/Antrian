<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Antrian</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #34495e; padding: 20px; border-radius: 15px; color: white; text-align: center; }
        button { width: 100%; height: 80px; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-call { background: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-call:active { background: #27ae60; transform: scale(0.95); }
        .status { font-size: 14px; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>ANTRIAN UMUM</h3>
        <button class="btn-call" onclick="panggil('Umum')">PANGGIL UMUM</button>
        <div id="stat-umum" class="status">Nomor terakhir: 0</div>
    </div>

    <div class="card">
        <h3>ANTRIAN SUNAT</h3>
        <button class="btn-call" onclick="panggil('Sunat')">PANGGIL SUNAT</button>
        <div id="stat-sunat" class="status">Nomor terakhir: 0</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // MASUKKAN CONFIG YANG SAMA PERSIS DENGAN INDEX.HTML
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_ANDA",
            authDomain: "PROJECT_ANDA.firebaseapp.com",
            databaseURL: "https://PROJECT_ANDA-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "PROJECT_ANDA",
            storageBucket: "PROJECT_ANDA.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variabel penyimpan nomor (nanti bisa diambil dari database agar sinkron)
        let nUmum = 0;
        let nSunat = 0;

        function panggil(tipe) {
            let nomor = 0;
            if (tipe === 'Umum') {
                nUmum++;
                nomor = nUmum;
                document.getElementById('stat-umum').innerText = "Nomor terakhir: " + nomor;
            } else {
                nSunat++;
                nomor = nSunat;
                document.getElementById('stat-sunat').innerText = "Nomor terakhir: " + nomor;
            }

            // KIRIM DATA KE FIREBASE
            db.ref('panggilan_klinik').set({
                tipe: tipe,
                nomor: nomor,
                trigger: Date.now() // Trigger agar laptop merespon
            });
        }
    </script>
</body>
</html>
