<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Antrian</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #34495e; padding: 20px; border-radius: 15px; color: white; text-align: center; }
        button { width: 100%; height: 80px; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-call { background: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-call:active { background: #27ae60; transform: scale(0.95); }
        .status { font-size: 14px; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>ANTRIAN UMUM</h3>
        <button class="btn-call" onclick="panggil('Umum')">PANGGIL UMUM</button>
        <div id="stat-umum" class="status">Nomor terakhir: 0</div>
    </div>

    <div class="card">
        <h3>ANTRIAN SUNAT</h3>
        <button class="btn-call" onclick="panggil('Sunat')">PANGGIL SUNAT</button>
        <div id="stat-sunat" class="status">Nomor terakhir: 0</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
      authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
      databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "antrian-klinik-cf6cb",
      storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
      messagingSenderId: "737102197117",
      appId: "1:737102197117:web:cc4752ea0c879741e35c14"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ✅ AMBIL DATA REALTIME (AMAN)
    db.ref('/').on('value', (snap) => {
        const data = snap.val() || {};

        const umumEl = document.getElementById('stat-umum');
        const sunatEl = document.getElementById('stat-sunat');

        if (umumEl) umumEl.innerText = "Nomor terakhir: " + (data.Umum || 0);
        if (sunatEl) sunatEl.innerText = "Nomor terakhir: " + (data.Sunat || 0);
    });

    // ✅ PANGGIL (SYNC DENGAN DATABASE)
    function panggil(tipe) {
        db.ref('/').once('value').then((snap) => {
            const data = snap.val() || {};

            let umum = data.Umum || 0;
            let sunat = data.Sunat || 0;
            let nomorBaru = 0;

            if (tipe === 'Umum') {
                umum++;
                nomorBaru = umum;
            } else {
                sunat++;
                nomorBaru = sunat;
            }

            db.ref('/').set({
                Umum: umum,
                Sunat: sunat,
                panggilan_klinik: {
                    tipe: tipe,
                    nomor: nomorBaru,
                    trigger: Date.now()
                }
            });
        });
    }
    </script>

</body>
</html>
