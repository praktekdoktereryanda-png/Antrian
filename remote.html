<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Remote Admin - Rumah Sunat Dr. Yanda</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .status-box { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #e74c3c; }
        .btn-stop { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #ddd; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .tab-btn.active { background: #3498db; color: white; }
        .queue-list { background: white; border-radius: 10px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .no-antrian { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        .btn-call { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .btn-done { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">REMOTE ADMIN</h1>

    <div id="calling-status" class="status-box" style="display: none;">
        <span>🔔 TV sedang memanggil...</span>
        <button class="btn-stop" onclick="stopCalling()">MATIKAN BELL</button>
    </div>

    <div class="tabs">
        <button id="tab-sunat" class="tab-btn active" onclick="switchTab('sunat')">SUNAT (N)</button>
        <button id="tab-umum" class="tab-btn" onclick="switchTab('umum')">UMUM (P/S)</button>
    </div>

    <div id="list-container" class="queue-list">
        <div style="text-align:center; padding:20px; color:#95a5a6;">Memuat data...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
        databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentTab = 'sunat';

    // Pantau status bell di TV
    db.ref('antrian/is_calling').on('value', (snap) => {
        document.getElementById('calling-status').style.display = snap.val() ? 'flex' : 'none';
    });

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-sunat').classList.toggle('active', tab === 'sunat');
        document.getElementById('tab-umum').classList.toggle('active', tab === 'umum');
        loadQueue();
    }

    function loadQueue() {
        const path = currentTab === 'sunat' ? 'antrian_list/sunat' : 'antrian_list/umum';
        db.ref(path).on('value', (snap) => {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            let hasData = false;

            snap.forEach((child) => {
                const data = child.val();
                if (data.status === 'menunggu') {
                    hasData = true;
                    const displayNo = currentTab === 'sunat' ? `N-${String(data.nomor).padStart(2, '0')}` : `${data.kode}-${String(data.nomor).padStart(2, '0')}`;
                    
                    const div = document.createElement('div');
                    div.className = 'queue-item';
                    div.innerHTML = `
                        <div class="no-antrian">${displayNo}</div>
                        <div>
                            <button class="btn-call" onclick="panggil(${data.nomor}, '${data.kode || ''}')">📢 PANGGIL</button>
                            <button class="btn-done" onclick="selesai('${child.key}')">✅ SELESAI</button>
                        </div>
                    `;
                    container.appendChild(div);
                }
            });
            if (!hasData) container.innerHTML = '<div style="text-align:center; padding:20px; color:#95a5a6;">Daftar tunggu kosong.</div>';
        });
    }

    function panggil(nomor, kode) {
        const tipe = currentTab === 'sunat' ? 'SUNAT' : 'UMUM';
        const updates = {};
        updates['antrian/is_calling'] = true;
        updates['antrian/tipe_panggil'] = tipe;
        updates[`antrian/nomor_dipanggil/${currentTab === 'sunat' ? 'Sunat' : 'Umum'}`] = nomor;
        if (kode) updates['antrian/kode_umum'] = kode;
        
        db.ref().update(updates);
    }

    function selesai(key) {
        stopCalling();
        const path = currentTab === 'sunat' ? 'antrian_list/sunat' : 'antrian_list/umum';
        db.ref(`${path}/${key}/status`).set('selesai');
    }

    function stopCalling() {
        db.ref('antrian/is_calling').set(false);
    }

    loadQueue();
</script>
</body>
</html>
