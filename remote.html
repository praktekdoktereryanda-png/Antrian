<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Antrian Klinik</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e272e; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            height: 100vh; 
            justify-content: center;
            margin: 0;
            box-sizing: border-box;
        }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        button { 
            width: 100%; 
            height: 150px; 
            font-size: 26px; 
            font-weight: bold; 
            border-radius: 25px; 
            border: none; 
            cursor: pointer; 
            transition: 0.2s; 
            color: white;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }

        /* Tombol Umum (Biru) */
        .btn-umum { background: #3498db; }
        .btn-umum:active { background: #2980b9; transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        /* Tombol Sunat (Orange) */
        .btn-sunat { background: #e67e22; }
        .btn-sunat:active { background: #d35400; transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        .status { font-size: 16px; opacity: 0.9; font-weight: normal; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 10px; }
        
        #koneksi { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            padding: 10px; 
            text-align: center; 
            font-size: 12px; 
            font-weight: bold; 
            color: white; 
            z-index: 100;
        }
        .online { background: #27ae60; }
        .offline { background: #e74c3c; }
    </style>
</head>
