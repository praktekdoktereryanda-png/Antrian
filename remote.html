<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Antrian</title>
    <style>
        body { font-family: sans-serif; background: #ecf0f1; padding: 20px; text-align: center; }
        .btn { width: 100%; padding: 25px; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 15px; margin-bottom: 20px; cursor: pointer; }
        .btn-umum { background: #2980b9; }
        .btn-sunat { background: #e67e22; }
        .last-call { font-size: 18px; color: #7f8c8d; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h2>REMOTE KLINIK</h2>
    
    <div class="last-call">Nomor Terakhir: <span id="view-nomor">0</span></div>

    <button class="btn btn-umum" onclick="panggil('Umum')">PANGGIL UMUM (P/S)</button>
    <button class="btn btn-sunat" onclick="panggil('Sunat')">PANGGIL SUNAT (N)</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAUGh816sqOpUlCBvTpHaPlrSV_Gi4kHiU",
            authDomain: "antrianklinik-784b0.firebaseapp.com",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0",
            storageBucket: "antrianklinik-784b0.firebasestorage.app",
            messagingSenderId: "432563775264",
            appId: "1:432563775264:web:deae77713393f98ac91945"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let nUmum = 0;
        let nSunat = 0;

        function panggil(tipe) {
            let nomor = 0;
            if (tipe === 'Umum') {
                nUmum++;
                nomor = nUmum;
            } else {
                nSunat++;
                nomor = nSunat;
            }

            document.getElementById('view-nomor').innerText = nomor;

            // Kirim ke Firebase
            db.ref('panggilan_klinik').set({
                tipe: tipe,
                nomor: nomor,
                trigger: Date.now()
            });
        }
    </script>
</body>
</html>
