<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Antrian</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #34495e; padding: 20px; border-radius: 15px; color: white; text-align: center; }
        button { width: 100%; height: 80px; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
        .btn-call { background: #2ecc71; color: white; margin-bottom: 10px; }
        .status { font-size: 14px; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>ANTRIAN UMUM</h3>
        <button class="btn-call" onclick="panggil('Umum')">PANGGIL UMUM</button>
        <div id="stat-umum" class="status">Loading...</div>
    </div>

    <div class="card">
        <h3>ANTRIAN SUNAT</h3>
        <button class="btn-call" onclick="panggil('Sunat')">PANGGIL SUNAT</button>
        <div id="stat-sunat" class="status">Loading...</div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
            authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
            databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrian-klinik-cf6cb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // realtime
        db.ref('/').on('value', function(snap) {
            const data = snap.val() || {};

            document.getElementById('stat-umum').innerText =
                "Nomor terakhir: " + (data.Umum || 0);

            document.getElementById('stat-sunat').innerText =
                "Nomor terakhir: " + (data.Sunat || 0);
        });

        // tombol
        function panggil(tipe) {
            db.ref('/').once('value').then(function(snap) {
                const data = snap.val() || {};

                let umum = data.Umum || 0;
                let sunat = data.Sunat || 0;
                let nomorBaru = 0;

                if (tipe === 'Umum') {
                    umum++;
                    nomorBaru = umum;
                } else {
                    sunat++;
                    nomorBaru = sunat;
                }

                db.ref('/').set({
                    Umum: umum,
                    Sunat: sunat,
                    panggilan_klinik: {
                        tipe: tipe,
                        nomor: nomorBaru,
                        trigger: Date.now()
                    }
                });
            });
        }

        window.panggil = panggil;

    } catch (e) {
        document.body.innerHTML = "<h2 style='color:white'>ERROR: " + e.message + "</h2>";
        console.error(e);
    }
    </script>

</body>
</html>
