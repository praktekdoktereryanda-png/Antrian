<script>

const firebaseConfig = {
  apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
  authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
  databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-klinik-cf6cb",
  storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
  messagingSenderId: "737102197117",
  appId: "1:737102197117:web:cc4752ea0c879741e35c14",
  measurementId: "G-K11JPNJPBR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 Ambil data realtime
db.ref('/').on('value', (snap) => {
    const data = snap.val() || {};

    document.getElementById('stat-umum').innerText =
        "Nomor terakhir: " + (data.Umum || 0);

    document.getElementById('stat-sunat').innerText =
        "Nomor terakhir: " + (data.Sunat || 0);
});

// 🔥 Fungsi panggil FIX
function panggil(tipe) {
    db.ref('/').once('value').then((snap) => {
        const data = snap.val() || {};

        let nomorBaru = 0;

        if (tipe === 'Umum') {
            nomorBaru = (data.Umum || 0) + 1;
        } else {
            nomorBaru = (data.Sunat || 0) + 1;
        }

        // 🔥 update ke Firebase
        db.ref('/').set({
            Umum: tipe === 'Umum' ? nomorBaru : (data.Umum || 0),
            Sunat: tipe === 'Sunat' ? nomorBaru : (data.Sunat || 0),
            panggilan_klinik: {
                tipe: tipe,
                nomor: nomorBaru,
                trigger: Date.now()
            }
        });
    });
}
</script>
