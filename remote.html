<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Antrian</title>

<style>
body {
    font-family: sans-serif;
    background: #2c3e50;
    padding: 20px;
}
.card {
    background: #34495e;
    padding: 20px;
    border-radius: 15px;
    color: white;
    text-align: center;
    margin-bottom: 20px;
}
button {
    width: 100%;
    height: 80px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 10px;
    border: none;
}
.btn { background: #2ecc71; color: white; }
</style>
</head>

<body>

<div class="card">
    <h3>ANTRIAN UMUM</h3>
    <button class="btn" onclick="panggil('Umum')">PANGGIL</button>
    <p id="umum">0</p>
</div>

<div class="card">
    <h3>ANTRIAN SUNAT</h3>
    <button class="btn" onclick="panggil('Sunat')">PANGGIL</button>
    <p id="sunat">0</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
  authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
  databaseURL: "https://project_anda-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-klinik-cf6cb",
  storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
  messagingSenderId: "737102197117",
  appId: "1:737102197117:web:cc4752ea0c879741e35c14",
  measurementId: "G-K11JPNJPBR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function panggil(tipe) {
    const ref = db.ref('antrian/' + tipe);

    ref.transaction((current) => {
        return (current || 0) + 1;
    }, (err, committed, snap) => {
        if (!committed) return;

        const nomor = snap.val();

        if (tipe === 'Umum') {
            document.getElementById('umum').innerText = nomor;
        } else {
            document.getElementById('sunat').innerText = nomor;
        }

        db.ref('panggilan_klinik').set({
            tipe: tipe,
            nomor: nomor,
            trigger: Date.now()
        });
    });
}
</script>

</body>
</html>
