<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Antrian - Web</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        button { width: 100%; padding: 1.2rem; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-sunat { background: #f1c40f; color: #2c3e50; }
        .btn-umum { background: #3498db; }
        button:active { transform: scale(0.95); }
        #status { margin-top: 15px; font-weight: bold; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #2c3e50;">Ambil Antrian</h2>
        <button class="btn-sunat" onclick="ambilAntrian('SUNAT')">ANTRIAN SUNAT (N)</button>
        <button class="btn-umum" onclick="ambilAntrian('UMUM')">PRAKTEK UMUM (P/S)</button>
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
            authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
            databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrian-klinik-cf6cb",
            storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
            messagingSenderId: "737102197117",
            appId: "1:737102197117:web:cc4752ea0c879741e35c14"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function ambilAntrian(tipe) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Memproses...";
            
            let kode = "N";
            if (tipe === "UMUM") {
                const jam = new Date().getHours();
                kode = (jam < 12) ? "P" : "S";
            }

            const counterRef = db.ref('counter/' + kode);
            counterRef.transaction((current) => (current || 0) + 1, (err, comm, snap) => {
                if (comm) {
                    const no = snap.val();
                    const formatted = kode + "-" + String(no).padStart(2, '0');
                    const path = tipe === 'SUNAT' ? 'antrian/antrian_list/sunat' : 'antrian/antrian_list/umum';
                    
                    db.ref(path).push({
                        nomor: no, kode: kode, status: "menunggu", timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    statusDiv.innerText = "NOMOR ANDA: " + formatted;
                }
            });
        }
    </script>
</body>
</html>
