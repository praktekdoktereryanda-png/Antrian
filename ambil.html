<!DOCTYPE html>
<html>
<head>
    <title>Ambil Antrian - Rumah Sunat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; padding: 50px; }
        .btn { padding: 40px; font-size: 2rem; border-radius: 20px; border: none; cursor: pointer; width: 300px; margin: 20px; font-weight: bold; }
        .btn-sunat { background: #f1c40f; color: black; }
        .btn-umum { background: #3498db; color: white; }
    </style>
</head>
<body>
    <h1>AMBIL ANTRIAN</h1>
    <button class="btn btn-sunat" onclick="ambil('sunat')">SUNAT (N)</button>
    <button class="btn btn-umum" onclick="ambil('umum')">UMUM (P/S)</button>

    <script>
        const firebaseConfig = { databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function ambil(tipe) {
            const jam = new Date().getHours();
            const kode = (tipe === 'sunat') ? 'N' : (jam < 12 ? 'P' : 'S');
            const counterPath = `counter/${kode}`;

            db.ref(counterPath).transaction((current) => {
                return (current || 0) + 1;
            }, (error, committed, snapshot) => {
                if (committed) {
                    const no = snapshot.val();
                    // Simpan ke antrian_list agar Admin bisa melihat
                    db.ref(`antrian_list/${tipe}`).push({
                        nomor: no,
                        kode: kode,
                        status: "menunggu",
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    // Update nomor_terakhir untuk info Kiosk
                    db.ref(`antrian/nomor_terakhir/${tipe === 'sunat' ? 'Sunat' : 'Umum'}`).set(no);
                    alert("Nomor Anda: " + kode + "-" + no.toString().padStart(2, '0'));
                }
            });
        }
    </script>
</body>
</html>
