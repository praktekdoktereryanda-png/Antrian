<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ambil Antrian - Klinik Dr. Yanda</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #2c3e50; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .btn-container { text-align: center; width: 90%; max-width: 500px; background: rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; }
        .btn { width: 100%; padding: 30px; margin: 15px 0; font-size: 24px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: #fff; }
        .btn-sunat { background: #f1c40f; color: #000; }
        .btn-umum { background: #3498db; }
        #ticket { display: none; background: white; color: black; padding: 20px; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="btn-container">
    <h1>AMBIL ANTRIAN</h1>
    <button class="btn btn-sunat" onclick="proses('Sunat')">SUNAT (KODE: N)</button>
    <button class="btn btn-umum" onclick="proses('Umum')">UMUM (KODE: P/S)</button>
    
    <div id="ticket">
        <h2>Nomor Anda:</h2>
        <h1 id="num-display" style="font-size: 60px;">-</h1>
        <p>Silakan tunggu panggilan di ruang tunggu</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
        databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function proses(tipe) {
        // Logika Reset Harian (Sama dengan MainActivity.kt)
        const today = new Date().toISOString().split('T')[0];
        const lastReset = await db.ref('metadata/last_reset_date').get();
        if (lastReset.val() !== today) {
            await db.ref().update({
                "counter/N": 0, "counter/P": 0, "counter/S": 0,
                "antrian/nomor_terakhir/Sunat": 0, "antrian/nomor_terakhir/Umum": 0,
                "metadata/last_reset_date": today
            });
        }

        const jam = new Date().getHours();
        const kode = (tipe === "Sunat") ? "N" : (jam < 12 ? "P" : "S");

        // Transaction untuk nomor urut
        db.ref('counter/' + kode).transaction((val) => (val || 0) + 1, (err, comm, snap) => {
            if (comm) {
                const num = snap.val();
                // 1. Update nomor_terakhir (Hanya agar Admin tahu pendaftar baru)
                db.ref(`antrian/nomor_terakhir/${tipe}`).setValue(num);
                
                // 2. Tambah ke list antrian
                const listPath = (tipe === "Sunat") ? "antrian_list/sunat" : "antrian_list/umum";
                db.ref(listPath).push({
                    nomor: num,
                    status: "menunggu",
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                // Tampilkan di layar Kiosk
                document.getElementById('num-display').innerText = `${kode}-${num.toString().padStart(2, '0')}`;
                document.getElementById('ticket').style.display = 'block';
                setTimeout(() => { document.getElementById('ticket').style.display = 'none'; }, 5000);
            }
        });
    }
</script>
</body>
</html>
