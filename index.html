<!DOCTYPE html>
<html>
<head>
    <title>Display Antrian TV</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .row { display: flex; gap: 50px; }
        .box { background: white; color: #2c3e50; padding: 40px; border-radius: 30px; min-width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .nomor { font-size: 150px; font-weight: 900; margin: 0; color: #2980b9; }
        h2 { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1 style="font-size: 50px; margin-bottom: 50px;">ANTRIAN KLINIK</h1>
    <div class="row">
        <div class="box">
            <h2>SUNAT</h2>
            <p class="nomor" id="s-no">N-00</p>
        </div>
        <div class="box">
            <h2>UMUM</h2>
            <p class="nomor" id="u-no">P-00</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* SAMA DENGAN DI ATAS */
            apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
            authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
            databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrian-klinik-cf6cb",
            storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
            messagingSenderId: "737102197117",
            appId: "1:737102197117:web:cc4752ea0c879741e35c14"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('antrian/nomor_dipanggil').on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('s-no').innerText = "N-" + String(d.Sunat || 0).padStart(2, '0');
                document.getElementById('u-no').innerText = (d.kode_umum || "P") + "-" + String(d.Umum || 0).padStart(2, '0');
            }
        });

        db.ref('panggilan_terbaru').on('value', snap => {
            const v = snap.val();
            if(v && v.nomor > 0) {
                const msg = new SpeechSynthesisUtterance(`Nomor antrian ${v.kode} ${v.nomor}, silahkan menuju ruang ${v.tipe}`);
                msg.lang = 'id-ID';
                window.speechSynthesis.speak(msg);
            }
        });
    </script>
</body>
</html>
