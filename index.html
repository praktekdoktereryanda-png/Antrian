<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Display TV - Rumah Sunat Dokter Yanda</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f4f7f6; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .sidebar-left { width: 30%; display: flex; flex-direction: column; justify-content: center; gap: 20px; padding: 20px; background: #fff; border-right: 2px solid #ddd; }
        .card { background: #fff; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 15px solid #f1c40f; }
        .card-umum { border-top-color: #3498db; }
        .num { font-size: 8vw; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .blink { animation: blinker 1s linear infinite; color: #e74c3c !important; }
        @keyframes blinker { 50% { opacity: 0; } }
        .center-video { width: 40%; background: #000; display: flex; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; background: black; }
        .sidebar-right { width: 30%; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #fff; border-left: 2px solid #ddd; }
        .poster-container { width: 100%; height: 70vh; position: relative; overflow: hidden; border-radius: 15px; background: #000; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 1s; }
        .poster-img.active { opacity: 1; }
        #clock { font-size: 3.5vw; font-weight: bold; color: #2c3e50; margin-top: auto; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
    </style>
</head>
<body onclick="startDisplay()">

    <div id="overlay">
        <h1>UNIT DISPLAY TV</h1>
        <p>KLIK LAYAR UNTUK AKTIFKAN SUARA & VIDEO</p>
    </div>
    
    <audio id="bell" src="audio/bell.mp3"></audio>

    <div class="sidebar-left">
        <div class="card">
            <h2 style="color:#f39c12; margin:0;">SUNAT</h2>
            <div class="num" id="sunatNum">N-00</div>
        </div>
        <div class="card card-umum">
            <h2 style="color:#2980b9; margin:0;">UMUM</h2>
            <div class="num" id="umumNum">P-00</div>
        </div>
    </div>

    <div class="center-video">
        <video id="vPlayer" muted></video>
    </div>

    <div class="sidebar-right">
        <div class="poster-container" id="posterList">
            <img src="poster/poster1.jpg" class="poster-img active">
            <img src="poster/poster2.jpg" class="poster-img">
        </div>
        <div id="clock">00:00:00</div>
        <p style="font-weight: bold; color: #7f8c8d; margin-top:10px;">Rumah Sunat Dokter Yanda</p>
    </div>

<script>
    // --- KONFIGURASI ---
    const GITHUB_USER = "praktekdoktereryanda-png"; 
    const GITHUB_REPO = "Antrian"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
        databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const vPlayer = document.getElementById('vPlayer');
    const bell = document.getElementById('bell');
    const sunatNum = document.getElementById('sunatNum');
    const umumNum = document.getElementById('umumNum');
    let isStarted = false;

    // 1. Sinkronisasi Data Firebase
    db.ref('antrian').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const sVal = (data.nomor_dipanggil?.Sunat || 0).toString().padStart(2, '0');
        const uVal = (data.nomor_dipanggil?.Umum || 0).toString().padStart(2, '0');
        const kodeUmum = data.nomor_dipanggil?.kode_umum || "P";

        sunatNum.innerText = `N-${sVal}`;
        umumNum.innerText = `${kodeUmum}-${uVal}`;

        if (data.is_calling === true) {
            vPlayer.pause();
            const isSunat = (data.tipe_panggil === "SUNAT");
            const target = isSunat ? sunatNum : umumNum;
            
            sunatNum.classList.remove('blink');
            umumNum.classList.remove('blink');
            target.classList.add('blink');
            
            panggilSuara(data.tipe_panggil, (isSunat ? sVal : uVal), (isSunat ? "N" : kodeUmum));
        } else {
            sunatNum.classList.remove('blink');
            umumNum.classList.remove('blink');
            if (isStarted) vPlayer.play().catch(() => {});
        }
    });

    // 2. Logika Suara Panggilan (TTS)
    function panggilSuara(tipe, nomor, kode) {
        window.speechSynthesis.cancel();
        bell.currentTime = 0;
        bell.play().then(() => {
            setTimeout(() => {
                let ruang = (tipe === "SUNAT") ? "ruang sunat" : "ruang dokter";
                let teks = `Nomor antrian. ${kode}. ${parseInt(nomor)}. Silakan masuk ke ${ruang}.`;
                const msg = new SpeechSynthesisUtterance(teks);
                msg.lang = 'id-ID';
                msg.onend = () => { db.ref('antrian/is_calling').set(false); };
                window.speechSynthesis.speak(msg);
            }, 2500);
        });
    }

    // 3. Scan & Putar Video dari GitHub
    async function fetchPlaylist() {
        try {
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/videos`;
            const res = await fetch(apiUrl);
            const files = await res.json();
            if (Array.isArray(files)) {
                const videoUrls = files
                    .filter(f => f.name.toLowerCase().endsWith('.mp4'))
                    .map(f => f.download_url);
                if (videoUrls.length > 0) playVideoList(videoUrls, 0);
            }
        } catch (e) { console.error("Gagal muat video GitHub:", e); }
    }

    function playVideoList(list, index) {
        if (index >= list.length) index = 0;
        vPlayer.src = list[index];
        vPlayer.load();
        vPlayer.play().catch(() => {});
        vPlayer.onended = () => playVideoList(list, index + 1);
    }

    function startDisplay() {
        if (isStarted) return;
        isStarted = true;
        document.getElementById('overlay').style.display = 'none';
        vPlayer.muted = false;
        fetchPlaylist();
        
        // Loop Poster & Jam
        setInterval(() => {
            const posters = document.querySelectorAll('.poster-img');
            const active = document.querySelector('.poster-img.active');
            active.classList.remove('active');
            let next = active.nextElementSibling || posters[0];
            next.classList.add('active');
        }, 8000);

        setInterval(() => {
            document.getElementById("clock").innerText = new Date().toLocaleTimeString("id-ID");
        }, 1000);
    }
</script>
</body>
</html>
