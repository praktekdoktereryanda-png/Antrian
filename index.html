<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Display TV - Rumah Sunat Dokter Yanda</title>
    <!-- Firebase SDK Legacy -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f4f7f6; display: flex; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Sidebar Kiri - Nomor Antrian */
        .sidebar-left { width: 35%; display: flex; flex-direction: column; justify-content: center; gap: 30px; padding: 30px; background: #fff; border-right: 3px solid #ddd; }
        .card { background: #fff; border-radius: 25px; padding: 40px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 20px solid #f1c40f; transition: 0.3s; }
        .card-umum { border-top-color: #3498db; }
        .num { font-size: 10vw; font-weight: 900; color: #2c3e50; margin: 10px 0; line-height: 1; }
        
        /* Animasi Berkedip saat Dipanggil */
        .blink { animation: blinker 0.8s linear infinite; color: #e74c3c !important; transform: scale(1.05); }
        @keyframes blinker { 50% { opacity: 0.2; } }

        /* TENGAH: Video Player (Cover Area) */
        .center-video { width: 35%; background: #000; display: flex; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; background: black; }

        /* Sidebar Kanan - Poster & Info */
        .sidebar-right { width: 30%; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #fff; border-left: 3px solid #ddd; }
        .poster-container { width: 100%; height: 65vh; position: relative; overflow: hidden; border-radius: 20px; background: #000; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .poster-img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: opacity 1s; }
        .poster-img.active { opacity: 1; }
        
        #clock { font-size: 4vw; font-weight: bold; color: #2c3e50; margin-top: auto; letter-spacing: 2px; }
        #overlay { position: fixed; inset: 0; background: rgba(44, 62, 80, 0.98); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; text-align: center; }
    </style>
</head>
<body onclick="startDisplay()">

    <div id="overlay">
        <h1 style="font-size: 4vw;">UNIT DISPLAY TV</h1>
        <p style="font-size: 1.5vw; opacity: 0.8;">KLIK DI MANA SAJA UNTUK AKTIFKAN SUARA & VIDEO</p>
    </div>
    
    <!-- Sound Bell (Pastikan file ada di folder audio/) -->
    <audio id="bell" src="audio/bell.mp3"></audio>

    <div class="sidebar-left">
        <div class="card" id="cardSunat">
            <h2 style="color:#f39c12; margin:0; font-size: 2vw;">ANTRIAN SUNAT</h2>
            <div class="num" id="sunatNum">N-00</div>
        </div>
        <div class="card card-umum" id="cardUmum">
            <h2 style="color:#2980b9; margin:0; font-size: 2vw;">PRAKTEK UMUM</h2>
            <div class="num" id="umumNum">P-00</div>
        </div>
    </div>

    <div class="center-video">
        <video id="vPlayer" loop muted></video>
    </div>

    <div class="sidebar-right">
        <div class="poster-container" id="posterList">
            <!-- Ganti dengan URL poster asli Anda -->
            <img src="poster/poster1.jpg" class="poster-img active">
            <img src="poster/poster2.jpg" class="poster-img">
        </div>
        <div id="clock">00:00:00</div>
        <p style="font-weight: bold; color: #16a085; font-size: 1.2vw; margin: 15px 0;">Rumah Sunat Dokter Yanda</p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
        databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const vPlayer = document.getElementById('vPlayer');
    const bell = document.getElementById('bell');
    const sunatNum = document.getElementById('sunatNum');
    const umumNum = document.getElementById('umumNum');
    let isStarted = false;

    // SINKRONISASI DATA DENGAN FIREBASE
    db.ref('antrian').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // Ambil data nomor dan kode dari database
        const sVal = (data.nomor_dipanggil?.Sunat || 0).toString().padStart(2, '0');
        const uVal = (data.nomor_dipanggil?.Umum || 0).toString().padStart(2, '0');
        const kodeUmum = data.nomor_dipanggil?.kode_umum || "P";

        sunatNum.innerText = `N-${sVal}`;
        umumNum.innerText = `${kodeUmum}-${uVal}`;

        // Cek jika ada panggilan aktif
        if (data.is_calling === true) {
            vPlayer.pause();
            const isSunat = (data.tipe_panggil === "SUNAT");
            const target = isSunat ? sunatNum : umumNum;
            
            // Reset blink
            sunatNum.classList.remove('blink');
            umumNum.classList.remove('blink');
            
            // Aktifkan blink pada yang dipanggil
            target.classList.add('blink');
            
            panggilSuara(data.tipe_panggil, (isSunat ? sVal : uVal), (isSunat ? "N" : kodeUmum));
        } else {
            sunatNum.classList.remove('blink');
            umumNum.classList.remove('blink');
            if (isStarted) vPlayer.play().catch(e => console.log("Video Play Blocked"));
        }
    });

    function panggilSuara(tipe, nomor, kode) {
        // Hentikan suara sebelumnya
        window.speechSynthesis.cancel();
        
        // Putar bel
        bell.currentTime = 0;
        bell.play().then(() => {
            // Setelah bel selesai (sekitar 2.5 detik), mulai suara manusia
            setTimeout(() => {
                let ruang = (tipe === "SUNAT") ? "ruang periksa sunat" : "ruang periksa umum";
                let teks = `Nomor antrian. ${kode}. ${parseInt(nomor)}. Silakan menuju ${ruang}.`;
                
                const msg = new SpeechSynthesisUtterance(teks);
                msg.lang = 'id-ID';
                msg.rate = 0.85; // Sedikit lebih lambat agar jelas
                msg.pitch = 1.1;
                
                msg.onend = () => {
                    // Setelah bicara selesai, matikan is_calling agar berhenti berkedip
                    db.ref('antrian/is_calling').set(false);
                };
                
                window.speechSynthesis.speak(msg);
            }, 2500);
        }).catch(e => console.log("Audio play failed, click screen first."));
    }

    function startDisplay() {
        if (isStarted) return;
        isStarted = true;
        document.getElementById('overlay').style.display = 'none';
        vPlayer.muted = false;
        
        // Putar Video (Anda bisa menambahkan fetchPlaylist GitHub di sini seperti sebelumnya)
        vPlayer.play().catch(e => {});

        // Loop Poster Samping (8 Detik)
        const posters = document.querySelectorAll('.poster-img');
        let pIdx = 0;
        setInterval(() => {
            posters[pIdx].classList.remove('active');
            pIdx = (pIdx + 1) % posters.length;
            posters[pIdx].classList.add('active');
        }, 8000);

        // Jam Digital
        setInterval(() => {
            document.getElementById("clock").innerText = new Date().toLocaleTimeString("id-ID", {hour12: false});
        }, 1000);
    }
</script>
</body>
</html>
