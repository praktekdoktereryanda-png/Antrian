<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Antrian - Backup Web</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background-color: #1976D2;
            padding: 20px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Area Utama */
        .main-container {
            display: flex;
            flex: 1;
        }

        /* Sisi Kiri (Nomor Antrian) */
        .queue-section {
            flex: 2;
            display: flex;
            flex-direction: row;
        }

        .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px solid #333;
        }

        .title { font-size: 3rem; color: #BBB; margin-bottom: 10px; }
        .number { font-size: 15rem; font-weight: 900; margin: 0; }
        .status { font-size: 1.5rem; color: #888; }

        /* Sisi Kanan (Video/Media) */
        .media-section {
            flex: 1;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 5px solid #1976D2;
        }

        video { width: 100%; height: auto; }

        /* Warna Khusus */
        #sunat-num { color: #FFEB3B; }
        #umum-num { color: #00BCD4; }

        /* Notifikasi Panggilan */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
        .overlay-text { font-size: 5rem; text-align: center; color: white; }
    </style>
</head>
<body>

    <div class="header">RUMAH SUNAT DR. YANDA</div>

    <div class="main-container">
        <div class="queue-section">
            <!-- Sunat -->
            <div class="card">
                <div class="title">SUNAT</div>
                <div id="sunat-num" class="number">N-00</div>
                <div class="status">MENUJU RUANG PERIKSA</div>
            </div>
            <!-- Umum -->
            <div class="card">
                <div class="title">UMUM</div>
                <div id="umum-num" class="number">P-00</div>
                <div class="status">MENUJU RUANG PERIKSA</div>
            </div>
        </div>

        <div class="media-section">
            <video id="promoVideo" autoplay muted loop>
                <source src="video-promo.mp4" type="video/mp4">
                Browser Anda tidak mendukung video.
            </video>
        </div>
    </div>

    <!-- Overlay Panggilan Suara -->
    <div id="overlay">
        <div class="overlay-text">MOHON PERHATIAN</div>
        <div id="panggilan-info" class="overlay-text" style="color: #FFEB3B;">N-01</div>
    </div>

    <script>
        // 1. KONFIGURASI FIREBASE (Salin dari Firebase Console Anda)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "antrianklinik2.firebaseapp.com",
            databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik2",
            storageBucket: "antrianklinik2.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('promoVideo');
        const overlay = document.getElementById('overlay');

        // 2. MENDENGARKAN PERUBAHAN DATA (Sinkron dengan AdminActivity.kt)
        db.ref('antrian').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Update Angka di Layar
            const sNum = String(data.Sunat || 0).padStart(2, '0');
            const uNum = String(data.Umum || 0).padStart(2, '0');
            const kUmum = data.kode_umum || 'P';

            document.getElementById('sunat-num').innerText = `N-${sNum}`;
            document.getElementById('umum-num').innerText = `${kUmum}-${uNum}`;

            // Logika Panggilan Suara (is_calling)
            if (data.is_calling === true) {
                video.pause();
                overlay.style.display = 'flex';
                
                const nomorFull = data.tipe_panggil === 'SUNAT' ? `N-${sNum}` : `${kUmum}-${uNum}`;
                document.getElementById('panggilan-info').innerText = nomorFull;

                // Suara Panggilan (Web Speech API)
                panggilSuara(data.tipe_panggil, data.tipe_panggil === 'SUNAT' ? sNum : uNum, kUmum);
            } else {
                video.play();
                overlay.style.display = 'none';
            }
        });

        function panggilSuara(tipe, nomor, kode) {
            const msg = new SpeechSynthesisUtterance();
            const teksNomor = nomor.split('').join(' '); // Biar dibaca per angka (misal 0 1)
            
            if (tipe === 'SUNAT') {
                msg.text = `Nomor antrian N, ${teksNomor}, Silahkan menuju ruang periksa sunat`;
            } else {
                msg.text = `Nomor antrian ${kode}, ${teksNomor}, Silahkan menuju ruang periksa umum`;
            }
            
            msg.lang = 'id-ID';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
