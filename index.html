<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Display Antrian</title>

<style>
body {
    margin:0;
    display:flex;
    height:100vh;
    font-family:sans-serif;
}

.left, .right {
    width:30%;
    padding:20px;
}

.center {
    width:40%;
    background:black;
}

.num {
    font-size:80px;
    font-weight:bold;
}
</style>
</head>

<body onclick="startAudio()">

<div class="left">
    <h2>SUNAT</h2>
    <div id="sunat" class="num">0</div>

    <h2>UMUM</h2>
    <div id="umum" class="num">0</div>
</div>

<div class="center"></div>
<div class="right"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
  authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
  databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-klinik-cf6cb",
  storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
  messagingSenderId: "737102197117",
  appId: "1:737102197117:web:cc4752ea0c879741e35c14",
  measurementId: "G-K11JPNJPBR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let lastTrigger = 0;

db.ref('panggilan_klinik').on('value', snap => {
    const data = snap.val();
    if (!data) return;

    if (data.trigger === lastTrigger) return;
    lastTrigger = data.trigger;

    document.getElementById('umum').innerText = data.tipe === 'Umum' ? data.nomor : document.getElementById('umum').innerText;
    document.getElementById('sunat').innerText = data.tipe === 'Sunat' ? data.nomor : document.getElementById('sunat').innerText;

    suara(data);
});

function startAudio() {
    console.log("audio ready");
}

function suara(data) {
    const teks = `Nomor ${data.tipe} ${data.nomor}, silahkan masuk`;

    const u = new SpeechSynthesisUtterance(teks);
    u.lang = 'id-ID';
    speechSynthesis.speak(u);
}
</script>

</body>
</html>
