<!DOCTYPE html>
<html>
<head>
    <title>Layar Antrian</title>
</head>
<body onclick="window.speechSynthesis.speak(new SpeechSynthesisUtterance('Suara Aktif'))" style="text-align:center; font-family:sans-serif;">
    <h1>NOMOR ANTRIAN</h1>
    <div id="display" style="font-size:150px; font-weight:bold;">0</div>
    <p>Klik layar ini 1x agar suara muncul</p>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const conf = {
            apiKey: "AIzaSyAUGh816sqOpUlCBvTpHaPlrSV_Gi4kHiU",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0"
        };
        firebase.initializeApp(conf);
        
        // Harus mendengarkan 'antrian_sekarang'
        firebase.database().ref('antrian_sekarang').on('value', (s) => {
            const d = s.val();
            if(d) {
                document.getElementById('display').innerText = d.nomor;
                let msg = new SpeechSynthesisUtterance("Nomor antrian " + d.nomor + " silakan masuk");
                msg.lang = 'id-ID';
                window.speechSynthesis.speak(msg);
            }
        });
    </script>
</body>
</html>
