<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Layar Antrian Klinik</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; text-align: center; }
        .container { display: flex; justify-content: space-around; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 40%; }
        h1 { color: #2c3e50; }
        .nomor { font-size: 80px; font-weight: bold; color: #3498db; margin: 20px 0; }
        video { width: 80%; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body onclick="aktifkanSuara()"> <h1>ANTRIAN KLINIK</h1>
    
    <div class="container">
        <div class="box">
            <h2>UMUM (P/S)</h2>
            <div id="nomor-umum" class="nomor">P-00</div>
        </div>
        <div class="box">
            <h2>SUNAT (N)</h2>
            <div id="nomor-sunat" class="nomor">N-00</div>
        </div>
    </div>

    <video autoplay loop muted>
        <source src="video-anda.mp4" type="video/mp4">
    </video>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. MASUKKAN CONFIG FIREBASE ANDA DI SINI
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_ANDA",
            authDomain: "PROJECT_ANDA.firebaseapp.com",
            databaseURL: "https://PROJECT_ANDA-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "PROJECT_ANDA",
            storageBucket: "PROJECT_ANDA.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abc"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let suaraAktif = false;
        function aktifkanSuara() { 
            suaraAktif = true; 
            console.log("Suara diaktifkan!");
        }

        // 2. MENDENGARKAN PERINTAH DARI HP
        db.ref('panggilan_klinik').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.trigger) {
                prosesPanggilan(data.tipe, data.nomor);
            }
        });

        function prosesPanggilan(tipe, nomor) {
            // Update Tampilan di Layar
            if (tipe === 'Sunat') {
                document.getElementById('nomor-sunat').innerText = 'N-' + nomor;
            } else {
                document.getElementById('nomor-umum').innerText = (nomor > 50 ? 'S-' : 'P-') + nomor;
            }

            // Fungsi Suara (Gunakan ResponsiveVoice atau SpeechSynthesis)
            if (suaraAktif) {
                const msg = new SpeechSynthesisUtterance(`Nomor antrian ${tipe} ${nomor}, silahkan menuju ruang periksa`);
                msg.lang = 'id-ID';
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
