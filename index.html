<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Antrian Klinik</title>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: sans-serif;
}

/* KIRI */
.left {
    width: 30%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.num {
    font-size: 80px;
    font-weight: bold;
}

.blink {
    animation: blink 1s linear 3;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* TENGAH */
.center {
    width: 40%;
    background: black;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* KANAN */
.right {
    width: 30%;
    padding: 20px;
    text-align: center;
}

#clock {
    font-size: 40px;
    margin-top: 20px;
}
</style>

</head>

<body onclick="startMedia()">

<div class="left">
    <div class="card">
        <h2>ANTRIAN SUNAT</h2>
        <div id="display-sunat" class="num">N-00</div>
    </div>

    <div class="card">
        <h2>PRAKTEK UMUM</h2>
        <div id="display-umum" class="num">P-00</div>
    </div>
</div>

<div class="center">
    <video id="vPlayer" muted>
        <source src="video1.mp4" type="video/mp4">
    </video>
</div>

<div class="right">
    <h2>INFO</h2>
    <div id="clock"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
  authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
  databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-klinik-cf6cb",
  storageBucket: "antrian-klinik-cf6cb.firebasestorage.app",
  messagingSenderId: "737102197117",
  appId: "1:737102197117:web:cc4752ea0c879741e35c14",
  measurementId: "G-K11JPNJPBR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🎬 VIDEO
const vPlayer = document.getElementById('vPlayer');
const videoFiles = ["video1.mp4", "video2.mp4"];
let videoIndex = 0;

vPlayer.onended = () => {
    videoIndex = (videoIndex + 1) % videoFiles.length;
    vPlayer.src = videoFiles[videoIndex];
    vPlayer.play();
};


// 🔊 AKTIFKAN SUARA (HARUS KLIK)
let suaraAktif = false;

function startMedia() {
    suaraAktif = true;
    vPlayer.muted = false;
    vPlayer.play();
}


// 🕒 JAM
function updateClock() {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString('id-ID');
}

setInterval(updateClock, 1000);


// 🔥 LISTENER FIREBASE (INTI SISTEM)
let lastCall = "";

db.ref('panggilan_terbaru').on('value', (snapshot) => {

    const data = snapshot.val();
    if (!data || !data.tipe) return;

    console.log("DATA MASUK:", data);

    const key = data.tipe + "-" + data.nomor;
    if (key === lastCall) return;
    lastCall = key;

    // Tentukan kode
    const jam = new Date().getHours();
    let kode = "N";

    if (data.tipe === "Umum") {
        kode = jam < 12 ? "P" : "S";
    }

    // Target element
    const targetId = data.tipe === "Sunat"
        ? "display-sunat"
        : "display-umum";

    const el = document.getElementById(targetId);

    // Update tampilan
    el.innerText = `${kode}-${data.nomor.toString().padStart(2, '0')}`;

    // Animasi
    el.classList.remove('blink');
    void el.offsetWidth;
    el.classList.add('blink');

    // 🔊 SUARA
    if (suaraAktif) {
        vPlayer.pause();

        const pesan = new SpeechSynthesisUtterance(
            `Nomor antrian ${kode} ${data.nomor}, silakan menuju ruang ${data.tipe}`
        );

        pesan.lang = 'id-ID';
        pesan.rate = 0.9;

        pesan.onend = () => {
            vPlayer.play();
        };

        window.speechSynthesis.speak(pesan);
    }
});

</script>

</body>
</html>
