<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>TV Antrian Klinik</title>

<style>
body {
    margin:0;
    display:flex;
    height:100vh;
}
.num {
    font-size:80px;
    font-weight:bold;
}
.blink {
    animation: blinker 1s linear 3;
}
@keyframes blinker {
    50% { opacity:0; }
}
</style>
</head>

<body onclick="aktifkanSuara()">

<div style="width:50%; text-align:center;">
    <h2>Sunat</h2>
    <div id="display-sunat" class="num">N-00</div>
</div>

<div style="width:50%; text-align:center;">
    <h2>Umum</h2>
    <div id="display-umum" class="num">P-00</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
  authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
  databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-klinik-cf6cb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let suaraAktif = false;
let lastCall = "";

function aktifkanSuara() {
    suaraAktif = true;
}

// LISTENER UTAMA (SESUAI JSON)
db.ref('panggilan_terbaru').on('value', snap => {

    const data = snap.val();

    if (!data || data.nomor === 0) return;

    const key = data.tipe + "-" + data.nomor;
    if (key === lastCall) return;
    lastCall = key;

    const jam = new Date().getHours();
    let kode = "N";

    if (data.tipe === "Umum") {
        kode = jam < 12 ? "P" : "S";
    }

    const el = data.tipe === "Sunat"
        ? document.getElementById('display-sunat')
        : document.getElementById('display-umum');

    el.innerText = `${kode}-${data.nomor.toString().padStart(2,'0')}`;

    // efek
    el.classList.remove('blink');
    void el.offsetWidth;
    el.classList.add('blink');

    // suara
    if (suaraAktif) {
        const suara = new SpeechSynthesisUtterance(
            `Nomor antrian ${kode} ${data.nomor}`
        );
        suara.lang = "id-ID";
        speechSynthesis.cancel();
        speechSynthesis.speak(suara);
    }

});
</script>

</body>
</html>
