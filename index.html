<!DOCTYPE html>
<html>
<head>
  <title>Antrian Klinik</title>
  <style>
    body {
      background: #2f3e4e;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    .card {
      background: #3d4f63;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
    }

    .btn {
      background: #2ecc71;
      border: none;
      padding: 15px;
      width: 100%;
      font-size: 18px;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn:hover {
      background: #27ae60;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>ANTRIAN UMUM</h2>
    <button class="btn">PANGGIL UMUM</button>
    <p>Nomor terakhir: <span id="umum">0</span></p>
  </div>

  <div class="card">
    <h2>ANTRIAN SUNAT</h2>
    <button class="btn">PANGGIL SUNAT</button>
    <p>Nomor terakhir: <span id="sunat">0</span></p>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "ISI_API_KEY",
      authDomain: "antrian-klinik-cf6cb.firebaseapp.com",
      databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "antrian-klinik-cf6cb",
      storageBucket: "antrian-klinik-cf6cb.appspot.com",
      messagingSenderId: "ISI",
      appId: "ISI"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 🔥 Ambil data realtime
    const rootRef = ref(db, "/");

    onValue(rootRef, (snapshot) => {
      const data = snapshot.val();

      document.getElementById("umum").innerText = data?.Umum ?? 0;
      document.getElementById("sunat").innerText = data?.Sunat ?? 0;

      console.log("DATA:", data);
    });

  </script>

</body>
</html>
