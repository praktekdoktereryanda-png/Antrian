<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Display TV - Rumah Sunat Dokter Yanda</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; }
        .sidebar { width: 30%; background: #fff; display: flex; flex-direction: column; justify-content: center; padding: 20px; gap: 20px; z-index: 10; }
        .card { background: #fff; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 20px solid #f1c40f; }
        .card-umum { border-top: 20px solid #3498db; }
        .num { font-size: 8vw; font-weight: bold; color: #2c3e50; }
        
        /* VIDEO & POSTER: NO BLACK BORDERS */
        .main-display { width: 70%; position: relative; background: #000; }
        video, .poster { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .blink { animation: blinker 1s linear infinite; color: #e74c3c !important; }
        @keyframes blinker { 50% { opacity: 0; } }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
    </style>
</head>
<body onclick="startDisplay()">
    <div id="overlay"><h1>KLIK UNTUK AKTIFKAN TV</h1></div>
    <audio id="bell" src="audio/bell.mp3"></audio>

    <div class="sidebar">
        <div class="card">
            <h2>SUNAT</h2>
            <div class="num" id="tv-sunat">N-00</div>
        </div>
        <div class="card card-umum">
            <h2>UMUM</h2>
            <div class="num" id="tv-umum">P-00</div>
        </div>
    </div>

    <div class="main-display">
        <img id="posterImg" class="poster" src="poster/default.jpg" style="display:none;">
        <video id="vPlayer" muted></video>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCw7vZ2LNJwZjMwBb5KC-TSc67LPl4W4f8",
            databaseURL: "https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LOGIKA: Hanya TV bereaksi pada 'nomor_dipanggil' (Trigger Admin)
        db.ref('antrian').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const sunat = (data.nomor_dipanggil?.Sunat || 0).toString().padStart(2, '0');
            const umum = (data.nomor_dipanggil?.Umum || 0).toString().padStart(2, '0');
            const kode = (new Date().getHours() < 12) ? "P" : "S";

            document.getElementById('tv-sunat').innerText = `N-${sunat}`;
            document.getElementById('tv-umum').innerText = `${kode}-${umum}`;

            if (data.is_calling === true) {
                const target = data.tipe_panggil === "SUNAT" ? "tv-sunat" : "tv-umum";
                document.getElementById(target).classList.add('blink');
                panggilSuara(data.tipe_panggil, data.tipe_panggil === "SUNAT" ? sunat : umum, kode);
            } else {
                document.getElementById('tv-sunat').classList.remove('blink');
                document.getElementById('tv-umum').classList.remove('blink');
            }
        });

        function panggilSuara(tipe, nomor, kode) {
            window.speechSynthesis.cancel();
            document.getElementById('bell').play().then(() => {
                setTimeout(() => {
                    const txt = tipe === "SUNAT" ? `Nomor antrian N ${nomor}, ruang sunat` : `Nomor antrian ${kode} ${nomor}, ruang umum`;
                    const msg = new SpeechSynthesisUtterance(txt);
                    msg.lang = 'id-ID';
                    window.speechSynthesis.speak(msg);
                }, 2500);
            });
        }

        function startDisplay() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('vPlayer').muted = false;
            // Fetch playlist video dari GitHub API (seperti kode sebelumnya)
        }
    </script>
</body>
</html>
