<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Display Antrian Klinik - Rumah Sunat Dokter Yanda</title>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; width: 100vw; overflow: hidden; color: white; }
        
        /* Layout */
        .sidebar-left { width: 35%; display: flex; flex-direction: column; justify-content: center; gap: 30px; padding: 30px; background: #1e1e1e; border-right: 4px solid #1976D2; }
        .center-video { width: 40%; background: #000; display: flex; justify-content: center; align-items: center; border-right: 2px solid #333; }
        .sidebar-right { width: 25%; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #1e1e1e; }

        /* Card Antrian */
        .card { background: #252525; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #333; width: 100%; }
        .card h2 { margin: 0; font-size: 2vw; color: #ffffff; border-bottom: 5px solid #1976D2; display: inline-block; padding-bottom: 5px; }
        .num { font-size: 9vw; font-weight: 900; margin: 10px 0; line-height: 1; }
        
        /* Warna Nomor */
        #display-sunat { color: #FFEB3B; } /* Kuning */
        #display-umum { color: #00BCD4; }  /* Cyan */

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        video { height: 100%; width: 100%; object-fit: cover; }

        /* Media Right */
        .poster-container { width: 100%; aspect-ratio: 3 / 4; position: relative; overflow: hidden; border-radius: 15px; background: #000; margin-bottom: 20px; border: 2px solid #444; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1s ease-in-out; }
        .poster-img.active { opacity: 1; }

        #clock { font-size: 3vw; font-weight: bold; color: #1976D2; margin-top: auto; font-family: 'Courier New', Courier, monospace; }
        .footer-name { font-weight: bold; color: #4CAF50; font-size: 1.2vw; margin: 15px 0; text-align: center; }
    </style>
</head>

<body onclick="initMedia()">

<div class="sidebar-left">
    <div class="card">
        <h2>ANTRIAN SUNAT</h2>
        <div class="num" id="display-sunat">N-00</div>
    </div>

    <div class="card">
        <h2 id="label-umum">ANTRIAN UMUM</h2>
        <div class="num" id="display-umum">P-00</div>
    </div>
</div>

<div class="center-video">
    <video id="vPlayer" loop muted playsinline>
        <source src="video1.mp4" type="video/mp4">
    </video>
</div>

<div class="sidebar-right">
    <div class="poster-container" id="posterList">
        <!-- Poster akan diisi via JS -->
    </div>
    <div id="clock">00:00:00</div>
    <p class="footer-name">Rumah Sunat Dokter Yanda</p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// 1. CONFIGURASI FIREBASE (GANTI SESUAI FIREBASE ANDA)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "https://antrianklinik2-default-rtdb.firebaseio.com" // Sesuaikan URL Anda
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const vPlayer = document.getElementById('vPlayer');
const sunatEl = document.getElementById('display-sunat');
const umumEl = document.getElementById('display-umum');

const posterFiles = ["poster1.jpg", "poster2.jpg"]; // Pastikan file ada di folder yang sama
let currentPosterIdx = 0;
let isMediaStarted = false;

// 2. JAM REALTIME
setInterval(() => {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString("id-ID");
}, 1000);

// 3. INISIALISASI MEDIA (Harus Klik Layar Dulu)
function initMedia() {
    if (isMediaStarted) return;
    isMediaStarted = true;
    vPlayer.play().catch(e => console.log("Video play blocked"));
    startPoster();
}

// 4. LOGIKA POSTER SLIDESHOW
function startPoster() {
    const container = document.getElementById('posterList');
    posterFiles.forEach((file, i) => {
        const img = document.createElement('img');
        img.src = file;
        img.className = "poster-img" + (i === 0 ? " active" : "");
        container.appendChild(img);
    });

    setInterval(() => {
        const posters = document.querySelectorAll('.poster-img');
        if (posters.length === 0) return;
        posters[currentPosterIdx].classList.remove('active');
        currentPosterIdx = (currentPosterIdx + 1) % posters.length;
        posters[currentPosterIdx].classList.add('active');
    }, 10000);
}

// 5. LISTEN FIREBASE - SINKRON DENGAN AdminActivity.kt
db.ref('antrian').on('value', (snap) => {
    const data = snap.val();
    if (!data) return;

    // Update Nomor Display
    const sVal = (data.Sunat || 0).toString().padStart(2, '0');
    const uVal = (data.Umum || 0).toString().padStart(2, '0');
    const kUmum = data.kode_umum || 'P';

    sunatEl.innerText = `N-${sVal}`;
    umumEl.innerText = `${kUmum}-${uVal}`;

    // Logika Panggilan (is_calling)
    if (data.is_calling === true) {
        // Efek Blink
        const targetEl = (data.tipe_panggil === "SUNAT") ? sunatEl : umumEl;
        targetEl.classList.add('blink');

        // Pause Video & Panggil Suara
        vPlayer.pause();
        speakQueue(data.tipe_panggil, sVal, uVal, kUmum);
    } else {
        // Berhenti Panggil
        sunatEl.classList.remove('blink');
        umumEl.classList.remove('blink');
        if (isMediaStarted) vPlayer.play();
    }
});

// 6. FUNGSI SUARA (TEXT TO SPEECH INDONESIA)
function speakQueue(tipe, sNum, uNum, kode) {
    if (!('speechSynthesis' in window)) return;
    
    // Batalkan suara yang sedang berjalan agar tidak tumpang tindih
    window.speechSynthesis.cancel();

    let text = "";
    if (tipe === "SUNAT") {
        text = `Nomor antrian. N. ${sNum.split('').join(' ')}. Silakan menuju ruang periksa sunat.`;
    } else {
        text = `Nomor antrian. ${kode}. ${uNum.split('').join(' ')}. Silakan menuju ruang periksa umum.`;
    }

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'id-ID';
    utter.rate = 0.8; // Kecepatan bicara agak pelan
    
    window.speechSynthesis.speak(utter);
}
</script>
</body>
</html>
