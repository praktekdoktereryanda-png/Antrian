<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Antrian Klinik - Rumah Sunat Dokter Yanda</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* KIRI: ANTRIAN */
        .sidebar-left { width: 30%; display: flex; flex-direction: column; justify-content: center; gap: 20px; padding: 20px; background: #fff; border-right: 2px solid #ddd; }
        .card { background: #fff; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .card h2 { margin: 0; font-size: 2vw; color: #34495e; border-bottom: 5px solid #f1c40f; display: inline-block; text-transform: uppercase; }
        .num { font-size: 8.5vw; font-weight: bold; margin: 5px 0; color: #2c3e50; }
        
        /* Animasi Panggil */
        .blink { animation: blinker 1s linear 3; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* TENGAH: VIDEO */
        .center-video { width: 40%; background: #000; display: flex; justify-content: center; align-items: center; }
        video { height: 100%; width: 100%; object-fit: cover; }

        /* KANAN: INFO & JADWAL */
        .sidebar-right { width: 30%; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #fff; border-left: 2px solid #ddd; }
        .poster-container { width: 95%; aspect-ratio: 4 / 5; position: relative; overflow: hidden; border-radius: 15px; background: #000; box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin-bottom: 10px; }
        .poster-img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .poster-img.active { opacity: 1; }

        #clock { font-size: 3.5vw; font-weight: bold; color: #2c3e50; margin-top: auto; }
        
        /* Panel Jadwal */
        .jadwal-box { background: #f9f9f9; border: 2px solid #e0e0e0; border-radius: 10px; padding: 10px; width: 90%; text-align: center; margin-top: 5px; }
        .jadwal-title { font-weight: bold; color: #e67e22; border-bottom: 1px solid #ddd; margin-bottom: 5px; font-size: 1.1vw; }
        .jadwal-item { font-size: 1vw; color: #555; margin: 2px 0; }
        .hari-tutup { color: #e74c3c; font-weight: bold; }

        .footer-name { font-weight: bold; color: #16a085; font-size: 1.2vw; margin: 10px 0; }
    </style>
</head>
<body onclick="startMedia()">

    <div class="sidebar-left">
        <div class="card">
            <h2>ANTRIAN SUNAT</h2>
            <div class="num" id="display-sunat">N-00</div>
        </div>
        <div class="card" style="border-top: 10px solid #3498db;">
            <h2 id="label-umum">PRAKTEK UMUM</h2>
            <div class="num" id="display-umum" style="color: #3498db;">P-00</div>
        </div>
    </div>

    <div class="center-video">
        <video id="vPlayer" playsinline muted>
            <source src="" type="video/mp4">
        </video>
    </div>

    <div class="sidebar-right">
        <div class="poster-container" id="posterList">
            </div>

        <div id="clock">00:00:00</div>

        <div class="jadwal-box">
            <div class="jadwal-title">JADWAL PRAKTEK</div>
            <div class="jadwal-item"><b>Pagi:</b> 06:00 - 09:00</div>
            <div class="jadwal-item"><b>Sore:</b> 16:00 - 20:00</div>
            <div class="jadwal-item hari-tutup">Minggu & Hari Besar: TUTUP</div>
        </div>

        <p class="footer-name">Rumah Sunat Dokter Yanda</p>
    </div>

    <script>
        // --- KONFIGURASI FILE ---
        const videoFiles = ["video1.mp4", "video2.mp4", "video3.mp4"]; // Tambah video di sini
        const posterFiles = ["Poster1.jpg", "Poster2.jpg", "Poster3.jpg"]; // Tambah poster di sini

        // --- STATE ---
        let antrian = JSON.parse(localStorage.getItem('antrian_yanda')) || { Sunat: 0, Umum: 0 };
        let currentVideoIdx = 0;
        let currentPosterIdx = 0;
        const vPlayer = document.getElementById('vPlayer');

        // --- INISIALISASI ---
        function init() {
            // Render Poster
            const container = document.getElementById('posterList');
            posterFiles.forEach((file, index) => {
                const img = document.createElement('img');
                img.src = file;
                img.className = `poster-img ${index === 0 ? 'active' : ''}`;
                container.appendChild(img);
            });

            vPlayer.src = videoFiles[0];
            updateDisplay();
            setInterval(updateClockAndStatus, 1000);
        }

        // --- LOGIKA WAKTU & STATUS ---
        function getStatusUmum() {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            const hari = sekarang.getDay(); // 0 = Minggu

            if (hari === 0) return { kode: 'X', label: 'KLINIK TUTUP' };
            if (jam >= 6 && jam < 9) return { kode: 'P', label: 'PRAKTEK PAGI' };
            if (jam >= 16 && jam < 20) return { kode: 'S', label: 'PRAKTEK SORE' };
            
            return { kode: 'U', label: 'PRAKTEK UMUM' };
        }

        function updateDisplay() {
            const status = getStatusUmum();
            document.getElementById('display-sunat').innerText = `N-${antrian.Sunat.toString().padStart(2, '0')}`;
            document.getElementById('display-umum').innerText = `${status.kode}-${antrian.Umum.toString().padStart(2, '0')}`;
            document.getElementById('label-umum').innerText = status.label;
        }

        function updateClockAndStatus() {
            const sekarang = new Date();
            document.getElementById('clock').innerText = sekarang.toLocaleTimeString('id-ID');
            // Update label secara real-time jika jam berubah
            const status = getStatusUmum();
            document.getElementById('label-umum').innerText = status.label;
        }

        // --- MEDIA ---
        function startMedia() {
            vPlayer.muted = false;
            vPlayer.play();
            startPosterCycle();
        }

        vPlayer.onended = () => {
            currentVideoIdx = (currentVideoIdx + 1) % videoFiles.length;
            vPlayer.src = videoFiles[currentVideoIdx];
            vPlayer.play();
        };

        function startPosterCycle() {
            const posters = document.querySelectorAll('.poster-img');
            if (posters.length <= 1) return;
            setInterval(() => {
                posters[currentPosterIdx].classList.remove('active');
                currentPosterIdx = (currentPosterIdx + 1) % posters.length;
                posters[currentPosterIdx].classList.add('active');
            }, 10000);
        }

        // --- PANGGIL ---
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'n') panggil('Sunat', 'N');
            if (key === 'p' || key === 's' || key === 'u') panggil('Umum', getStatusUmum().kode);
            if (key === 'f') toggleFS();
            if (key === 'r') resetData();
        });

        function panggil(tipe, kode) {
            antrian[tipe]++;
            localStorage.setItem('antrian_yanda', JSON.stringify(antrian));
            updateDisplay();

            const targetId = tipe === 'Sunat' ? 'display-sunat' : 'display-umum';
            const el = document.getElementById(targetId);
            el.classList.remove('blink');
            void el.offsetWidth;
            el.classList.add('blink');

            suaraAsisten(kode, antrian[tipe].toString().padStart(2, '0'), tipe);
        }

        function suaraAsisten(huruf, angka, tujuan) {
            window.speechSynthesis.cancel();
            vPlayer.pause();

            const ejaanAngka = angka.split('').join(' ');
            const pesan = `Nomor antrian. ${huruf}. ${ejaanAngka}. Silahkan menuju ruang. ${tujuan}.`;
            
            const utter = new SpeechSynthesisUtterance(pesan);
            utter.lang = 'id-ID';
            utter.rate = 0.8;
            utter.onend = () => vPlayer.play();
            window.speechSynthesis.speak(utter);
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function resetData() {
            if(confirm("Reset Antrian?")) {
                antrian = { Sunat: 0, Umum: 0 };
                localStorage.setItem('antrian_yanda', JSON.stringify(antrian));
                updateDisplay();
            }
        }

        init();
    </script>
</body>
</html>
