<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Antrian Klinik - Rumah Sunat Dokter Yanda</title>

<style>
body { margin:0; padding:0; background:#f4f7f6; font-family:'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden;}
.sidebar-left { width:30%; display:flex; flex-direction:column; justify-content:center; gap:20px; padding:20px; background:#fff; border-right:2px solid #ddd;}
.card { background:#fff; border-radius:20px; padding:20px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.1);}
.card h2 { font-size:2vw; margin:0;}
.num { font-size:8vw; font-weight:bold;}
.center-video { width:40%; background:#000; display:flex; align-items:center; justify-content:center;}
video { width:100%; height:100%; object-fit:cover;}
.sidebar-right { width:30%; padding:20px; background:#fff; display:flex; flex-direction:column; align-items:center;}
.poster-container { width:95%; aspect-ratio:4/5; position:relative;}
.poster-img { position:absolute; width:100%; height:100%; object-fit:cover; opacity:0;}
.poster-img.active { opacity:1;}
#clock { font-size:3vw; margin-top:auto;}
</style>
</head>

<body onclick="aktifkanAudio()">

<div class="sidebar-left">
<div class="card">
<h2>ANTRIAN SUNAT</h2>
<div class="num" id="display-sunat">N-00</div>
</div>

<div class="card">
<h2>PRAKTEK UMUM</h2>
<div class="num" id="display-umum">P-00</div>
</div>
</div>

<div class="center-video">
<video id="vPlayer" autoplay muted playsinline>
<source src="/video1.mp4" type="video/mp4">
</video>
</div>

<div class="sidebar-right">
<div class="poster-container" id="posterList"></div>
<div id="clock"></div>
</div>

<audio id="audioPlayer"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
databaseURL:"https://antrian-klinik-cf6cb-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const vPlayer = document.getElementById("vPlayer");
const audioPlayer = document.getElementById("audioPlayer");

let audioAktif=false;
let lastCall="";

/* 🔥 AKTIFKAN AUDIO (WAJIB KLIK 1x) */
function aktifkanAudio(){
audioAktif=true;
vPlayer.muted=false;
vPlayer.play();
}

/* 🔥 POSTER */
const posters=["/poster/Poster1.jpg","/poster/Poster2.jpg"];
let idx=0;

function initPoster(){
const container=document.getElementById("posterList");
posters.forEach((src,i)=>{
let img=document.createElement("img");
img.src=src;
img.className="poster-img"+(i==0?" active":"");
container.appendChild(img);
});

setInterval(()=>{
let p=document.querySelectorAll(".poster-img");
p[idx].classList.remove("active");
idx=(idx+1)%p.length;
p[idx].classList.add("active");
},8000);
}

/* 🔥 JAM */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString("id-ID");
},1000);

/* 🔥 AUDIO FIX */
async function playSequence(list){
for(let i=0;i<list.length;i++){
try{
audioPlayer.src=list[i];
await audioPlayer.play();
await new Promise(r=>setTimeout(r,1200));
}catch(e){
console.log("skip",list[i]);
}
}
vPlayer.play();
}

/* 🔥 TANPA SILAHKAN */
function playAntrian(kode,nomor,tipe){

const angka=nomor.toString().padStart(2,'0').split('');

let files=[
"/audio/bell.mp3",
"/audio/antrian.mp3",
`/audio/${kode}.mp3`
];

angka.forEach(a=>{
files.push(`/audio/${a}.mp3`);
});

/* 🔥 LANGSUNG KE TUJUAN */
if(tipe==="Umum"){
files.push("/audio/umum.mp3");
}else{
files.push("/audio/sunat.mp3");
}

playSequence(files);
}

/* 🔥 FIREBASE */
db.ref('panggilan_terbaru').on('value',(snap)=>{
const data=snap.val();
if(!data||data.nomor==0)return;

const key=data.tipe+"-"+data.nomor;
if(key===lastCall)return;
lastCall=key;

const jam=new Date().getHours();
const kode=(data.tipe==="Umum")?(jam<12?"P":"S"):"N";

const target=data.tipe==="Sunat"?"display-sunat":"display-umum";
const el=document.getElementById(target);

el.innerText=`${kode}-${data.nomor.toString().padStart(2,'0')}`;

if(audioAktif){
vPlayer.pause();
playAntrian(kode,data.nomor,data.tipe);
}
});

/* START */
initPoster();
</script>

</body>
</html>
