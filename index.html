<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Antrian Klinik</title>
</head>
<body onclick="window.speechSynthesis.speak(new SpeechSynthesisUtterance('Suara aktif'))">
    <h1 id="tampilan">P-00</h1>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_ANDA_DI_SINI",
            databaseURL: "https://antrianklinik-784b0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "antrianklinik-784b0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('panggilan').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('tampilan').innerText = data.nomor;
                let audio = new SpeechSynthesisUtterance("Nomor antrian " + data.nomor + " silahkan masuk");
                audio.lang = 'id-ID';
                window.speechSynthesis.speak(audio);
            }
        });
    </script>
</body>
</html>
